<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security+ Daily Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --panel: #0d1520;
    --border: #1a2e44;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #00ff88;
    --red: #ff3b5c;
    --text: #c8dce8;
    --dim: #4a6070;
    --glow: 0 0 20px rgba(0,212,255,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .logo span { color: var(--accent2); }

  h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    text-transform: uppercase;
  }

  h1 em {
    color: var(--accent);
    font-style: normal;
  }

  .streak-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.3);
    padding: 4px 10px;
    letter-spacing: 2px;
  }

  /* Domain selector */
  .domain-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }

  .domain-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 6px 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .domain-btn:hover, .domain-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.05);
    box-shadow: var(--glow);
  }

  /* Launch panel */
  .launch-panel {
    border: 1px solid var(--border);
    background: var(--panel);
    padding: 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .launch-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .launch-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 8px;
  }

  .launch-sub {
    font-size: 14px;
    color: var(--dim);
    margin-bottom: 32px;
    font-weight: 300;
  }

  .btn-primary {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 14px 40px;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.2s;
    z-index: -1;
  }

  .btn-primary:hover {
    color: var(--bg);
    box-shadow: var(--glow);
  }

  .btn-primary:hover::before { transform: translateX(0); }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .loading.show { display: block; }

  .loader {
    display: inline-block;
    width: 48px;
    height: 48px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 3px;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* Lesson card */
  .lesson-card {
    display: none;
    border: 1px solid var(--border);
    background: var(--panel);
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.4s ease;
  }

  .lesson-card.show { display: block; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  .lesson-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .card-header {
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  .domain-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent2);
    text-transform: uppercase;
  }

  .topic-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
    flex: 1;
    margin: 0 16px;
  }

  .card-body {
    padding: 28px;
  }

  /* Lesson content styling */
  .lesson-content {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    font-weight: 300;
  }

  .lesson-content h3 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin: 24px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(0,212,255,0.2);
  }

  .lesson-content h3:first-child { margin-top: 0; }

  .lesson-content p { margin-bottom: 14px; }

  .lesson-content ul, .lesson-content ol {
    padding-left: 20px;
    margin-bottom: 14px;
  }

  .lesson-content li { margin-bottom: 6px; }

  .lesson-content strong {
    color: #fff;
    font-weight: 600;
  }

  .lesson-content code {
    font-family: 'Share Tech Mono', monospace;
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.15);
    padding: 1px 6px;
    font-size: 13px;
    color: var(--accent);
  }

  .lesson-content .highlight-box {
    border-left: 3px solid var(--accent2);
    background: rgba(255,107,53,0.05);
    padding: 12px 16px;
    margin: 16px 0;
    font-size: 14px;
  }

  /* Quiz section */
  .quiz-section {
    display: none;
    margin-top: 2px;
    border: 1px solid var(--border);
    background: var(--panel);
    animation: fadeIn 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .quiz-section.show { display: block; }

  .quiz-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }

  .quiz-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .quiz-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent2);
    text-transform: uppercase;
  }

  .quiz-progress {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    margin-left: auto;
  }

  .question-block {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: none;
  }

  .question-block.active { display: block; }

  .question-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .question-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .options {
    display: grid;
    gap: 8px;
  }

  .option-btn {
    width: 100%;
    text-align: left;
    padding: 12px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(0,212,255,0.04);
  }

  .option-btn .opt-letter {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    min-width: 18px;
    padding-top: 1px;
  }

  .option-btn.correct {
    border-color: var(--green);
    background: rgba(0,255,136,0.08);
    color: var(--green);
  }

  .option-btn.correct .opt-letter { color: var(--green); }

  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(255,59,92,0.08);
    color: var(--red);
  }

  .option-btn.wrong .opt-letter { color: var(--red); }

  .option-btn:disabled { cursor: default; }

  .explanation {
    display: none;
    margin-top: 16px;
    padding: 14px 16px;
    border-left: 3px solid var(--accent);
    background: rgba(0,212,255,0.05);
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); }

  .next-btn {
    margin-top: 16px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    cursor: pointer;
    display: none;
    transition: all 0.2s;
  }

  .next-btn.show { display: inline-block; }
  .next-btn:hover { background: rgba(0,212,255,0.1); }

  /* Score panel */
  .score-panel {
    display: none;
    padding: 40px 28px;
    text-align: center;
    animation: fadeIn 0.4s ease;
  }

  .score-panel.show { display: block; }

  .score-big {
    font-family: 'Rajdhani', sans-serif;
    font-size: 72px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 8px;
  }

  .score-big.great { color: var(--green); text-shadow: 0 0 30px rgba(0,255,136,0.4); }
  .score-big.okay { color: var(--accent); text-shadow: 0 0 30px rgba(0,212,255,0.4); }
  .score-big.poor { color: var(--red); text-shadow: 0 0 30px rgba(255,59,92,0.4); }

  .score-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .score-msg {
    font-size: 16px;
    color: var(--text);
    margin-bottom: 32px;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }

  .btn-secondary {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 28px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary:hover { border-color: var(--text); color: var(--text); }

  /* Error */
  .error-box {
    display: none;
    padding: 20px 24px;
    border: 1px solid rgba(255,59,92,0.3);
    background: rgba(255,59,92,0.05);
    color: var(--red);
    font-size: 14px;
    margin-top: 16px;
  }

  .error-box.show { display: block; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="logo">SEC<span>+</span> TRAINER // SY0-701</div>
      <h1>Daily <em>Security+</em> Drill</h1>
    </div>
    <div class="streak-badge" id="streakBadge">DAY 1</div>
  </header>

  <!-- Domain selector -->
  <div class="domain-bar">
    <button class="domain-btn active" data-domain="random">⚡ Random</button>
    <button class="domain-btn" data-domain="Threats, Attacks & Vulnerabilities">Threats & Attacks</button>
    <button class="domain-btn" data-domain="Architecture & Design">Architecture</button>
    <button class="domain-btn" data-domain="Implementation">Implementation</button>
    <button class="domain-btn" data-domain="Operations & Incident Response">Ops & IR</button>
    <button class="domain-btn" data-domain="Governance, Risk & Compliance">GRC</button>
  </div>

  <!-- Launch -->
  <div class="launch-panel" id="launchPanel">
    <div class="launch-title">Ready for today's lesson?</div>
    <div class="launch-sub">A focused topic + 5 practice questions. ~10 minutes.</div>
    <button class="btn-primary" id="startBtn" onclick="startLesson()">▶ START TODAY'S LESSON</button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="loader"></div>
    <div class="loading-text">GENERATING LESSON...</div>
  </div>

  <!-- Lesson -->
  <div class="lesson-card" id="lessonCard">
    <div class="card-header">
      <span class="domain-tag" id="domainTag"></span>
      <span class="topic-title" id="topicTitle"></span>
    </div>
    <div class="card-body">
      <div class="lesson-content" id="lessonContent"></div>
      <br>
      <button class="btn-primary" onclick="showQuiz()" id="quizBtn">TAKE THE QUIZ →</button>
    </div>
  </div>

  <!-- Quiz -->
  <div class="quiz-section" id="quizSection">
    <div class="quiz-header">
      <span class="quiz-label">⬡ Quiz</span>
      <span class="quiz-progress" id="quizProgress"></span>
    </div>
    <div id="questionsContainer"></div>

    <!-- Score panel inside quiz -->
    <div class="score-panel" id="scorePanel">
      <div class="score-big" id="scoreBig"></div>
      <div class="score-label">QUESTIONS CORRECT</div>
      <div class="score-msg" id="scoreMsg"></div>
      <button class="btn-secondary" onclick="startLesson()">NEW LESSON</button>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

</div>

<script>
// ── State ──────────────────────────────────────────────
let questions = [];
let currentQ = 0;
let score = 0;
let selectedDomain = 'random';
let lessonTopics = [];

// ── Streak (localStorage) ──────────────────────────────
function updateStreak() {
  try {
    const today = new Date().toDateString();
    const last = localStorage.getItem('secplus_last');
    let streak = parseInt(localStorage.getItem('secplus_streak') || '0');
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (last === today) { /* same day, no change */ }
    else if (last === yesterday) { streak++; }
    else { streak = 1; }
    localStorage.setItem('secplus_last', today);
    localStorage.setItem('secplus_streak', streak);
    document.getElementById('streakBadge').textContent = `DAY ${streak}`;
  } catch(e) {}
}

// ── Domain buttons ─────────────────────────────────────
document.querySelectorAll('.domain-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.domain-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDomain = btn.dataset.domain;
  });
});

// ── Main: start lesson ─────────────────────────────────
async function startLesson() {
  // Reset UI
  document.getElementById('launchPanel').style.display = 'none';
  document.getElementById('lessonCard').classList.remove('show');
  document.getElementById('quizSection').classList.remove('show');
  document.getElementById('scorePanel').classList.remove('show');
  document.getElementById('questionsContainer').innerHTML = '';
  document.getElementById('errorBox').classList.remove('show');
  document.getElementById('loading').classList.add('show');
  questions = []; currentQ = 0; score = 0;

  updateStreak();

  const domain = selectedDomain === 'random'
    ? ['Threats, Attacks & Vulnerabilities','Architecture & Design','Implementation','Operations & Incident Response','Governance, Risk & Compliance'][Math.floor(Math.random()*5)]
    : selectedDomain;

  const prompt = `You are a CompTIA Security+ SY0-701 instructor. Generate a short daily lesson and 5 quiz questions on the domain: "${domain}".

Choose a SPECIFIC topic within that domain (e.g., "SQL Injection", "Zero Trust Architecture", "MFA Implementation", "Chain of Custody", "Risk Register").

Respond ONLY with valid JSON, no markdown, no backticks, no preamble. Use this exact structure:
{
  "domain": "domain name",
  "topic": "specific topic name",
  "lesson": "HTML content using only: <h3>, <p>, <ul>, <ol>, <li>, <strong>, <code> tags. 200-300 words. Cover: what it is, why it matters for Security+, key exam points. Use <h3> for section headings.",
  "questions": [
    {
      "question": "question text",
      "options": ["A. ...", "B. ...", "C. ...", "D. ..."],
      "correct": 0,
      "explanation": "Why A is correct and why the others are not. 1-2 sentences."
    }
  ]
}
The correct field is the 0-based index of the correct option. Include exactly 5 questions. Make questions realistic Security+ exam style.`;

  try {
    const res = await fetch("https://polished-king-d350.zackberetskywatch.workers.dev/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 4096,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error?.message || `API error ${res.status}: ${JSON.stringify(data)}`);
    if (!data.content) throw new Error('No content in response: ' + JSON.stringify(data));
    let raw = data.content.map(i => i.text || '').join('').trim();
    raw = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/, '').trim();
    const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
    if (s !== -1 && e !== -1) raw = raw.slice(s, e + 1);
    const parsed = JSON.parse(raw);

    document.getElementById('loading').classList.remove('show');
    renderLesson(parsed);
  } catch(e) {
    document.getElementById('loading').classList.remove('show');
    const eb = document.getElementById('errorBox');
    eb.textContent = `Failed to load lesson. Check your connection and try again. (${e.message})`;
    eb.classList.add('show');
    document.getElementById('launchPanel').style.display = 'block';
  }
}

// ── Render lesson ──────────────────────────────────────
function renderLesson(data) {
  questions = data.questions;
  document.getElementById('domainTag').textContent = data.domain;
  document.getElementById('topicTitle').textContent = data.topic;
  document.getElementById('lessonContent').innerHTML = data.lesson;
  document.getElementById('lessonCard').classList.add('show');
}

// ── Show quiz ──────────────────────────────────────────
function showQuiz() {
  document.getElementById('lessonCard').querySelector('#quizBtn').style.display = 'none';
  document.getElementById('quizSection').classList.add('show');
  document.getElementById('quizSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  renderQuestion(0);
}

function renderQuestion(idx) {
  const container = document.getElementById('questionsContainer');
  // Remove old active
  container.querySelectorAll('.question-block').forEach(b => b.classList.remove('active'));

  const q = questions[idx];
  const letters = ['A','B','C','D'];
  const block = document.createElement('div');
  block.className = 'question-block active';
  block.id = `q${idx}`;

  document.getElementById('quizProgress').textContent = `${idx+1} / ${questions.length}`;

  block.innerHTML = `
    <div class="question-num">QUESTION ${idx+1} OF ${questions.length}</div>
    <div class="question-text">${q.question}</div>
    <div class="options" id="opts${idx}">
      ${q.options.map((opt,i) => `
        <button class="option-btn" onclick="answer(${idx},${i})" id="opt${idx}_${i}">
          <span class="opt-letter">${letters[i]}.</span>
          <span>${opt.replace(/^[A-D]\.\s*/,'')}</span>
        </button>`).join('')}
    </div>
    <div class="explanation" id="exp${idx}"><strong>Explanation:</strong> ${q.explanation}</div>
    <button class="next-btn" id="next${idx}" onclick="nextQuestion(${idx})">${idx < questions.length-1 ? 'NEXT QUESTION →' : 'SEE RESULTS →'}</button>
  `;
  container.appendChild(block);
}

function answer(qIdx, chosen) {
  const q = questions[qIdx];
  const opts = document.getElementById(`opts${qIdx}`).querySelectorAll('.option-btn');
  opts.forEach(b => b.disabled = true);

  if (chosen === q.correct) {
    opts[chosen].classList.add('correct');
    score++;
  } else {
    opts[chosen].classList.add('wrong');
    opts[q.correct].classList.add('correct');
  }

  document.getElementById(`exp${qIdx}`).classList.add('show');
  document.getElementById(`next${qIdx}`).classList.add('show');
}

function nextQuestion(current) {
  const next = current + 1;
  if (next < questions.length) {
    document.getElementById(`q${current}`).classList.remove('active');
    renderQuestion(next);
    document.getElementById(`q${next}`).scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } else {
    showScore();
  }
}

function showScore() {
  document.getElementById('questionsContainer').querySelectorAll('.question-block').forEach(b => b.style.display='none');
  const panel = document.getElementById('scorePanel');
  const big = document.getElementById('scoreBig');
  const msg = document.getElementById('scoreMsg');
  const pct = Math.round(score / questions.length * 100);

  big.textContent = `${score}/${questions.length}`;
  big.className = 'score-big ' + (pct >= 80 ? 'great' : pct >= 60 ? 'okay' : 'poor');

  const messages = {
    great: ["Solid. That's exam-ready knowledge.", "Strong performance — keep this up daily.", "You're building real retention. Nice work."],
    okay:  ["Good foundation. Review the misses.", "Getting there — consistency is key.", "On track. The explanations above will help."],
    poor:  ["Re-read the lesson and try again tomorrow.", "These concepts need more repetition — that's normal.", "Tough domain. Daily drilling will fix this."]
  };
  const tier = pct >= 80 ? 'great' : pct >= 60 ? 'okay' : 'poor';
  msg.textContent = messages[tier][Math.floor(Math.random()*3)];

  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
